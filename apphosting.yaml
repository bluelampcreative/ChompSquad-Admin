runConfig:
  concurrency: 80
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 2

# Environment variables — values are set in the Firebase App Hosting console,
# not stored in this file. See .env.local.example for local dev setup.
env:
  - variable: NEXT_PUBLIC_API_URL
    availability:
      - BUILD
      - RUNTIME
